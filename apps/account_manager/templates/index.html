{% extends "base.html" %}

{% block title %}test{% endblock title %}

{% block content %}
    <ul class="navbar-nav">
        {% if current_user.is_authenticated %}
        <li class="nav-item">
            <span class="nav-link">{{current_user.account_name}}</span>
        </li>
        <li class="nav-item">
            <a href="{{url_for('ac.logout')}}" class="nav-link">ログアウト</a>
        </li>
        {% else %}
        <li class="nav-item">
            <a class="nav-link" href="{{url_for('ac.signup')}}">新規登録</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{url_for('ac.login')}}">ログイン</a>
        </li>
        {% endif %}
    </ul>
    <p>テスト</p>
{% endblock content %}
